<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>認證失敗</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 420px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgb(239 68 68);
            overflow: hidden;
        }
        .header {
            padding: 40px 30px 20px;
            text-align: center;
        }
        .icon {
            width: 110px;
            height: 110px;
            background: #fee2e2;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 60px;
        }
        .content {
            padding: 0 30px 30px;
            text-align: center;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            color: #ef4444;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 22px;
            color: #ef4444;
            margin-bottom: 24px;
        }
        .info-box {
            background: #fee2e2;
            border: 2px solid #fecaca;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
            font-size: 18px;
            color: #991b1b;
        }
        button {
            width: 100%;
            padding: 18px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .btn-primary {
            background: #ef4444;
            color: white;
            border: none;
        }
        .btn-primary:active {
            background: #dc2626;
            transform: scale(0.97);
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
            border: 2px solid #e2e8f0;
        }
        .btn-secondary:active {
            background: #e2e8f0;
            transform: scale(0.97);
        }
        .footer {
            text-align: center;
            padding: 20px 30px;
            color: #ef4444;
            opacity: 0.7;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="icon">❌</div>
        </div>
        <div class="content">
            <h1>認證失敗</h1>
            <p class="subtitle">帳號或密碼錯誤</p>
            
            <div class="info-box">
                請確認您的登入資訊<br>
                或聯絡管理員
            </div>

            <button class="btn-primary" onclick="window.history.back()">
                ← 重新輸入帳號密碼
            </button>
            
            <button class="btn-secondary" onclick="window.location.href='https://www.google.com'">
                取消並返回
            </button>
            
            <p class="footer">TP-Link 認證系統</p>
        </div>
    </div>
</body>
</html>
